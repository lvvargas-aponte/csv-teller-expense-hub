services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TELLER_CERT_PATH=/app/certs/certificate.pem
      - TELLER_KEY_PATH=/app/certs/private_key.pem
    volumes:
      - ./backend:/app
      - ./certs:/app/certs:ro
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
      - HOST=0.0.0.0
      # Use polling for file-watch hot-reload — inotify is unreliable in Docker
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge