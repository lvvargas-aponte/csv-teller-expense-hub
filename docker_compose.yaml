version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - TELLER_APPLICATION_ID=${TELLER_APPLICATION_ID}
      - TELLER_PRIVATE_KEY=${TELLER_PRIVATE_KEY}
      - TELLER_ENVIRONMENT=${TELLER_ENVIRONMENT:-sandbox}
    volumes:
      - ./backend:/app
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge